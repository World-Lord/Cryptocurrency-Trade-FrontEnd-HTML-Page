<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldLord P2P — 3D Viewer</title>
    <style>
        /* Полный сброс отступов для работы на весь экран */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #11151c;
        }

        /* Контейнер занимает 100% видимой области экрана */
        .sketchfab-embed-wrapper {
            width: 100%;
            height: 100%;
        }

        .sketchfab-embed-wrapper iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Встроенный чистый плеер твоей модели на весь экран -->
    <div class="sketchfab-embed-wrapper"> 
        <iframe 
            title="Microphone Rebellion" 
            frameborder="0" 
            allowfullscreen 
            mozallowfullscreen="true" 
            webkitallowfullscreen="true" 
            allow="autoplay; fullscreen; xr-spatial-tracking" 
            xr-spatial-tracking 
            execution-while-out-of-viewport 
            execution-while-not-rendered 
            web-share 
            src="https://sketchfab.com"> 
        </iframe> 
    </div>

</body>
</html>
